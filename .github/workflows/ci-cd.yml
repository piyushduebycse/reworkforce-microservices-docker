name: RevWorkforce CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  backend-build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build Infrastructure Services
        run: |
          cd backend
          mvn clean install -pl service-discovery,config-server,api-gateway -DskipTests

      - name: Build & Test Business Services
        run: |
          cd backend
          mvn clean verify -pl user-service,leave-service,performance-service,employee-management-service,reporting-service,notification-service

      - name: Upload Test Reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-reports
          path: |
            backend/*/target/surefire-reports/
            backend/*/target/site/jacoco/

  frontend-build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/revworkforce-ui/package-lock.json

      - name: Install dependencies
        run: |
          cd frontend/revworkforce-ui
          npm ci

      - name: Run unit tests
        run: |
          cd frontend/revworkforce-ui
          npm run test -- --watch=false --browsers=ChromeHeadless --code-coverage

      - name: Build production
        run: |
          cd frontend/revworkforce-ui
          npm run build -- --configuration production

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/revworkforce-ui/dist/

  docker-build:
    runs-on: ubuntu-latest
    needs: [backend-build-test, frontend-build-test]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Backend Services
        run: |
          cd backend
          mvn clean package -DskipTests
          cd ..
          docker compose -f docker/docker-compose.yml build

      - name: Run Integration Tests
        run: |
          docker compose -f docker/docker-compose.yml up -d mysql service-discovery config-server
          sleep 30
          docker compose -f docker/docker-compose.yml up -d user-service
          sleep 20
          echo "Services started successfully"
          docker compose -f docker/docker-compose.yml ps
          docker compose -f docker/docker-compose.yml down
