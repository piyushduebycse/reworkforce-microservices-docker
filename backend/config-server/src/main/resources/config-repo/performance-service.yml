server:
  port: 8083

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/revworkforce_performance_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: root
    password: revworkforce@123
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
