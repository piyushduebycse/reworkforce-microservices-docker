server:
  port: 8080

spring:
  cloud:
    gateway:
      routes:
        - id: user-service
          uri: lb://user-service
          predicates:
            - Path=/api/auth/**, /api/users/**, /api/profiles/**
          filters:
            - name: CircuitBreaker
              args:
                name: userServiceCB
                fallbackUri: forward:/fallback/user-service

        - id: leave-service
          uri: lb://leave-service
          predicates:
            - Path=/api/leaves/**
          filters:
            - name: CircuitBreaker
              args:
                name: leaveServiceCB
                fallbackUri: forward:/fallback/leave-service

        - id: performance-service
          uri: lb://performance-service
          predicates:
            - Path=/api/performance/**
          filters:
            - name: CircuitBreaker
              args:
                name: performanceServiceCB
                fallbackUri: forward:/fallback/performance-service

        - id: employee-management-service
          uri: lb://employee-management-service
          predicates:
            - Path=/api/employees/**, /api/departments/**, /api/designations/**, /api/announcements/**
          filters:
            - name: CircuitBreaker
              args:
                name: employeeManagementServiceCB
                fallbackUri: forward:/fallback/employee-management-service

        - id: reporting-service
          uri: lb://reporting-service
          predicates:
            - Path=/api/reports/**
          filters:
            - name: CircuitBreaker
              args:
                name: reportingServiceCB
                fallbackUri: forward:/fallback/reporting-service

        - id: notification-service
          uri: lb://notification-service
          predicates:
            - Path=/api/notifications/**
          filters:
            - name: CircuitBreaker
              args:
                name: notificationServiceCB
                fallbackUri: forward:/fallback/notification-service

      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOrigins:
              - "http://localhost:4200"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: true

resilience4j:
  circuitbreaker:
    instances:
      userServiceCB:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 5
      leaveServiceCB:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
      performanceServiceCB:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
      employeeManagementServiceCB:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
      reportingServiceCB:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
      notificationServiceCB:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s

jwt:
  secret: revworkforce-super-secret-jwt-key-2025-must-be-at-least-256-bits-long

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,circuitbreakers
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.revworkforce: DEBUG
